  <header class="header">
    <a class="header-back" href="/tools/">
      <i class="fa fa-chevron-left"></i> tools
    </a>
    <span class="header-title">Timezone Clock</span>
  </header>

  <div class="container">
    <div class="hero">
      <h1>Timezone <span>Clock</span></h1>
    </div>
    <div class="hint">
      <span><i class="fa fa-arrows-h"></i> Drag the slider (or scroll) to shift time</span>
      <span><i class="fa fa-plus"></i> Add clocks to compare</span>
      <span><i class="fa fa-refresh"></i> Reset returns to live time</span>
    </div>

    <div class="offset-bar">
      <span class="offset-label">Offset</span>
      <span class="offset-value" id="offsetDisplay">live time</span>
      <button class="offset-reset" id="resetBtn">Reset to now</button>
      <div class="time-scrubber">
        <button class="step-btn" id="stepDown" aria-label="Back one minute">&minus;</button>
        <input type="range" id="timeSlider" min="-1440" max="1440" step="1" value="0" aria-label="Shift time" />
        <button class="step-btn" id="stepUp" aria-label="Forward one minute">+</button>
      </div>
    </div>

    <div class="clocks-wrap" id="clocksWrap">
      <!-- clocks injected by JS -->
      <button class="add-clock-btn" id="addBtn">
        <i class="fa fa-plus"></i>
        <span>Add timezone</span>
      </button>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3>Add Timezone</h3>
        <button class="modal-close" id="modalClose"><i class="fa fa-times"></i></button>
      </div>
      <div class="modal-search">
        <input type="text" id="tzSearch" placeholder="Search city or timezone…" autocomplete="off" />
      </div>
      <div class="modal-list" id="tzList"></div>
    </div>
  </div>

<script>
const TIMEZONES = [
  { city: 'London',        country: 'United Kingdom',   tz: 'Europe/London' },
  { city: 'New York',      country: 'United States',    tz: 'America/New_York' },
  { city: 'Toronto',       country: 'Canada',           tz: 'America/Toronto' },
  { city: 'Los Angeles',   country: 'United States',    tz: 'America/Los_Angeles' },
  { city: 'Chicago',       country: 'United States',    tz: 'America/Chicago' },
  { city: 'Vancouver',     country: 'Canada',           tz: 'America/Vancouver' },
  { city: 'Dubai',         country: 'UAE',              tz: 'Asia/Dubai' },
  { city: 'Mumbai',        country: 'India',            tz: 'Asia/Kolkata' },
  { city: 'Delhi',         country: 'India',            tz: 'Asia/Kolkata' },
  { city: 'Karachi',       country: 'Pakistan',         tz: 'Asia/Karachi' },
  { city: 'Lahore',        country: 'Pakistan',         tz: 'Asia/Karachi' },
  { city: 'Islamabad',     country: 'Pakistan',         tz: 'Asia/Karachi' },
  { city: 'Dhaka',         country: 'Bangladesh',       tz: 'Asia/Dhaka' },
  { city: 'Tokyo',         country: 'Japan',            tz: 'Asia/Tokyo' },
  { city: 'Seoul',         country: 'South Korea',      tz: 'Asia/Seoul' },
  { city: 'Beijing',       country: 'China',            tz: 'Asia/Shanghai' },
  { city: 'Shanghai',      country: 'China',            tz: 'Asia/Shanghai' },
  { city: 'Hong Kong',     country: 'Hong Kong',        tz: 'Asia/Hong_Kong' },
  { city: 'Singapore',     country: 'Singapore',        tz: 'Asia/Singapore' },
  { city: 'Bangkok',       country: 'Thailand',         tz: 'Asia/Bangkok' },
  { city: 'Sydney',        country: 'Australia',        tz: 'Australia/Sydney' },
  { city: 'Melbourne',     country: 'Australia',        tz: 'Australia/Melbourne' },
  { city: 'Auckland',      country: 'New Zealand',      tz: 'Pacific/Auckland' },
  { city: 'Paris',         country: 'France',           tz: 'Europe/Paris' },
  { city: 'Berlin',        country: 'Germany',          tz: 'Europe/Berlin' },
  { city: 'Amsterdam',     country: 'Netherlands',      tz: 'Europe/Amsterdam' },
  { city: 'Rome',          country: 'Italy',            tz: 'Europe/Rome' },
  { city: 'Madrid',        country: 'Spain',            tz: 'Europe/Madrid' },
  { city: 'Stockholm',     country: 'Sweden',           tz: 'Europe/Stockholm' },
  { city: 'Moscow',        country: 'Russia',           tz: 'Europe/Moscow' },
  { city: 'Istanbul',      country: 'Turkey',           tz: 'Europe/Istanbul' },
  { city: 'Cairo',         country: 'Egypt',            tz: 'Africa/Cairo' },
  { city: 'Nairobi',       country: 'Kenya',            tz: 'Africa/Nairobi' },
  { city: 'Lagos',         country: 'Nigeria',          tz: 'Africa/Lagos' },
  { city: 'Johannesburg',  country: 'South Africa',     tz: 'Africa/Johannesburg' },
  { city: 'São Paulo',     country: 'Brazil',           tz: 'America/Sao_Paulo' },
  { city: 'Mexico City',   country: 'Mexico',           tz: 'America/Mexico_City' },
  { city: 'Buenos Aires',  country: 'Argentina',        tz: 'America/Argentina/Buenos_Aires' },
  { city: 'Reykjavik',     country: 'Iceland',          tz: 'Atlantic/Reykjavik' },
  { city: 'UTC',           country: 'Universal Time',   tz: 'UTC' },
];

// State
let offsetMs = 0;
const STORAGE_KEY = 'tz-clock-config';

function loadClocks() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch {}
  return [
    { ...TIMEZONES.find(t => t.city === 'London') },
    { ...TIMEZONES.find(t => t.city === 'Toronto') },
  ];
}

function saveClocks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(clocks)); } catch {}
}

let clocks = loadClocks();
let ticker = null;

// DOM refs
const clocksWrap = document.getElementById('clocksWrap');
const addBtn = document.getElementById('addBtn');
const offsetDisplay = document.getElementById('offsetDisplay');
const resetBtn = document.getElementById('resetBtn');
const modalOverlay = document.getElementById('modalOverlay');
const modalClose = document.getElementById('modalClose');
const tzSearch = document.getElementById('tzSearch');
const tzList = document.getElementById('tzList');

function pad(n) { return String(n).padStart(2, '0'); }

function formatOffset(ms) {
  if (ms === 0) return 'live time';
  const sign = ms > 0 ? '+' : '-';
  const abs = Math.abs(ms);
  const h = Math.floor(abs / 3600000);
  const m = Math.floor((abs % 3600000) / 60000);
  if (h === 0) return `${sign}${m}m`;
  if (m === 0) return `${sign}${h}h`;
  return `${sign}${h}h ${m}m`;
}

function getOffsetLabel(tz, date) {
  try {
    const parts = new Intl.DateTimeFormat('en', {
      timeZone: tz,
      timeZoneName: 'shortOffset'
    }).formatToParts(date);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    return tzPart ? tzPart.value : '';
  } catch { return ''; }
}

function renderClocks() {
  // Remove existing clock cards (keep the add button)
  const existing = clocksWrap.querySelectorAll('.clock-card');
  existing.forEach(el => el.remove());

  const now = new Date(Date.now() + offsetMs);

  clocks.forEach((clock, i) => {
    const fmt12 = new Intl.DateTimeFormat('en-US', {
      timeZone: clock.tz,
      hour: 'numeric',
      minute: '2-digit',
      hour12: true,
    });
    const fmtSec = new Intl.DateTimeFormat('en-US', {
      timeZone: clock.tz,
      second: '2-digit',
      hour12: false,
    });
    const fmtDate = new Intl.DateTimeFormat('en-US', {
      timeZone: clock.tz,
      weekday: 'short',
      month: 'short',
      day: 'numeric',
    });

    const timeParts = fmt12.formatToParts(now);
    const hour   = timeParts.find(p => p.type === 'hour').value;
    const min    = timeParts.find(p => p.type === 'minute').value;
    const ampm   = timeParts.find(p => p.type === 'dayPeriod').value;
    const sec    = fmtSec.format(now).padStart(2, '0');
    const dateStr = fmtDate.format(now);
    const tzLabel = getOffsetLabel(clock.tz, now);

    const card = document.createElement('div');
    card.className = 'clock-card';
    card.innerHTML = `
      <button class="clock-remove" data-index="${i}" title="Remove"><i class="fa fa-times"></i></button>
      <div class="clock-city">${clock.city}</div>
      <div class="clock-country">${clock.country}</div>
      <div class="clock-display">${pad(hour)}:${min}<span class="clock-ampm">${ampm}</span></div>
      <div class="clock-seconds">:${sec}</div>
      <div class="clock-date">${dateStr}</div>
      <div class="clock-offset">${tzLabel}</div>
    `;
    clocksWrap.insertBefore(card, addBtn);
  });

  offsetDisplay.textContent = formatOffset(offsetMs);
  syncSlider();

  // Bind remove buttons
  clocksWrap.querySelectorAll('.clock-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.index);
      clocks.splice(idx, 1);
      saveClocks();
      renderClocks();
    });
  });
}

function startTicker() {
  if (ticker) clearInterval(ticker);
  ticker = setInterval(renderClocks, 1000);
}

// Scroll to shift time — accumulate delta so 1 scroll notch = exactly 1 minute
let scrollAccum = 0;
let scrollFlush = null;
window.addEventListener('wheel', (e) => {
  e.preventDefault();
  scrollAccum += e.deltaY;
  const threshold = 50;
  const step = 60 * 1000;
  while (scrollAccum >= threshold)  { offsetMs -= step; scrollAccum -= threshold; }
  while (scrollAccum <= -threshold) { offsetMs += step; scrollAccum += threshold; }
  clearTimeout(scrollFlush);
  scrollFlush = setTimeout(() => { scrollAccum = 0; }, 200);
  renderClocks();
}, { passive: false });

// Reset
resetBtn.addEventListener('click', () => {
  offsetMs = 0;
  renderClocks();
});

// Time scrubber (slider + steppers) — primary control on touch devices
const timeSlider = document.getElementById('timeSlider');
const stepDown   = document.getElementById('stepDown');
const stepUp     = document.getElementById('stepUp');
const SLIDER_MAX = 1440; // minutes (±24h)
let sliderActive = false;

function syncSlider() {
  if (sliderActive) return;
  const mins = Math.round(offsetMs / 60000);
  timeSlider.value = Math.max(-SLIDER_MAX, Math.min(SLIDER_MAX, mins));
}

timeSlider.addEventListener('input', () => {
  sliderActive = true;
  offsetMs = parseInt(timeSlider.value, 10) * 60000;
  renderClocks();
});
['change', 'pointerup', 'touchend', 'mouseup', 'blur'].forEach(ev =>
  timeSlider.addEventListener(ev, () => { sliderActive = false; })
);

stepDown.addEventListener('click', () => { offsetMs -= 60000; renderClocks(); });
stepUp.addEventListener('click',   () => { offsetMs += 60000; renderClocks(); });

// Modal
function openModal() {
  renderTzList('');
  tzSearch.value = '';
  modalOverlay.classList.add('open');
  setTimeout(() => tzSearch.focus(), 50);
}
function closeModal() {
  modalOverlay.classList.remove('open');
}

addBtn.addEventListener('click', openModal);
modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

tzSearch.addEventListener('input', () => {
  renderTzList(tzSearch.value.trim().toLowerCase());
});

function renderTzList(query) {
  const filtered = query
    ? TIMEZONES.filter(t =>
        t.city.toLowerCase().includes(query) ||
        t.country.toLowerCase().includes(query) ||
        t.tz.toLowerCase().includes(query)
      )
    : TIMEZONES;

  tzList.innerHTML = '';
  filtered.forEach(tz => {
    const row = document.createElement('div');
    row.className = 'tz-option';
    row.innerHTML = `
      <span class="tz-option-city">${tz.city}, ${tz.country}</span>
      <span class="tz-option-zone">${tz.tz.split('/').pop().replace('_', ' ')}</span>
    `;
    row.addEventListener('click', () => {
      clocks.push({ ...tz });
      saveClocks();
      renderClocks();
      closeModal();
    });
    tzList.appendChild(row);
  });

  if (!filtered.length) {
    tzList.innerHTML = '<div style="padding:20px;text-align:center;color:#333;font-size:13px;">No results</div>';
  }
}

// Keyboard: Escape closes modal, arrow keys shift time
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowUp' && !modalOverlay.classList.contains('open')) {
    offsetMs += 60 * 1000;
    renderClocks();
  }
  if (e.key === 'ArrowDown' && !modalOverlay.classList.contains('open')) {
    offsetMs -= 60 * 1000;
    renderClocks();
  }
});

// Init
renderClocks();
startTicker();
</script>
</body>
</html>
