  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #555;
      font-family: 'LatoRegular', Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }
    .header-back {
      text-decoration: none;
      color: #ccc;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-back:hover { color: #31bbac; }
    .header-title {
      font-size: 14px;
      letter-spacing: 0.1em;
      color: #bbb;
      text-transform: uppercase;
    }

    /* ---- layout ---- */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 32px 40px;
      gap: 20px;
      min-height: 0;
    }

    .hero { flex-shrink: 0; }
    .hero h1 {
      font-size: clamp(24px, 3.5vw, 38px);
      color: #ccc;
      font-weight: 300;
      letter-spacing: -0.02em;
    }
    .hero h1 span { color: #31bbac; }
    .hero p {
      margin-top: 6px;
      font-size: 13px;
      color: #bbb;
      letter-spacing: 0.04em;
    }

    /* ---- toolbar ---- */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 3px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s, color 0.2s, opacity 0.2s;
    }
    .btn-primary { background: #31bbac; color: #fff; }
    .btn-primary:hover { background: #28a89a; }
    .btn-ghost {
      background: transparent;
      color: #bbb;
      border: 1px solid #e0e0e0;
    }
    .btn-ghost:hover { color: #31bbac; border-color: #31bbac; }
    .btn:disabled { opacity: 0.5; cursor: default; }

    /* ---- download dropdown ---- */
    .dropdown { position: relative; display: inline-block; }
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
      min-width: 210px;
      padding: 6px;
      z-index: 50;
      display: none;
      flex-direction: column;
      gap: 2px;
    }
    .dropdown-menu.open { display: flex; }
    .dropdown-menu button {
      display: flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 9px 12px;
      border-radius: 3px;
      font-size: 12px;
      letter-spacing: 0.05em;
      color: #666;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .dropdown-menu button:hover { background: #f4fbfa; color: #31bbac; }
    .dropdown-menu button i { width: 16px; text-align: center; color: #31bbac; }

    .toolbar-sep {
      width: 1px;
      height: 24px;
      background: #eee;
    }

    .word-count {
      font-size: 12px;
      color: #ccc;
      letter-spacing: 0.06em;
      margin-left: auto;
    }

    /* ---- editor grid ---- */
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .panel-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #bbb;
    }

    textarea {
      flex: 1;
      min-height: 480px;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 16px;
      font-size: 13px;
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.65;
      resize: none;
      outline: none;
      color: #444;
      background: #fafafa;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #31bbac; background: #fff; }

    /* ---- preview ---- */
    .preview-wrap {
      flex: 1;
      min-height: 480px;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      overflow: auto;
      background: #fff;
    }

    .preview {
      padding: 24px 28px;
      font-size: 14px;
      line-height: 1.75;
      color: #333;
    }

    /* Markdown rendered styles */
    .preview h1, .preview h2, .preview h3,
    .preview h4, .preview h5, .preview h6 {
      color: #222;
      margin: 1.4em 0 0.5em;
      line-height: 1.3;
      font-family: 'LatoBold', Verdana, sans-serif;
    }
    .preview h1 { font-size: 1.8em; border-bottom: 2px solid #f0f0f0; padding-bottom: 0.25em; }
    .preview h2 { font-size: 1.4em; border-bottom: 1px solid #f0f0f0; padding-bottom: 0.2em; }
    .preview h3 { font-size: 1.15em; }
    .preview h4 { font-size: 1em; color: #555; }

    .preview p { margin: 0.75em 0; }

    .preview a { color: #31bbac; text-decoration: none; }
    .preview a:hover { text-decoration: underline; }

    .preview strong { color: #222; font-family: 'LatoBold', Verdana, sans-serif; }
    .preview em { font-style: italic; }

    .preview ul, .preview ol {
      margin: 0.75em 0;
      padding-left: 1.6em;
    }
    .preview li { margin: 0.3em 0; }

    .preview blockquote {
      border-left: 3px solid #31bbac;
      margin: 1em 0;
      padding: 0.5em 1em;
      background: #f9fefe;
      color: #666;
      border-radius: 0 3px 3px 0;
    }
    .preview blockquote p { margin: 0; }

    .preview code {
      background: #f4f4f4;
      color: #c7254e;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.88em;
      font-family: 'Courier New', monospace;
    }

    .preview pre {
      margin: 1em 0;
      border-radius: 4px;
      overflow: auto;
    }
    .preview pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      font-size: 0.85em;
    }

    .preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.9em;
    }
    .preview th {
      background: #f8f8f8;
      border: 1px solid #e0e0e0;
      padding: 8px 12px;
      text-align: left;
      font-family: 'LatoBold', Verdana, sans-serif;
      color: #444;
    }
    .preview td {
      border: 1px solid #e8e8e8;
      padding: 7px 12px;
    }
    .preview tr:nth-child(even) td { background: #fafafa; }

    .preview hr {
      border: none;
      border-top: 2px solid #f0f0f0;
      margin: 1.5em 0;
    }

    .preview img {
      max-width: 100%;
      border-radius: 4px;
    }

    .preview-empty {
      color: #ccc;
      font-style: italic;
      font-size: 13px;
    }

    .preview-wrap:focus-within {
      border-color: #31bbac;
    }

    .preview[contenteditable]:focus {
      outline: none;
    }

    .preview-edit-hint {
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.06em;
      font-style: italic;
    }

    /* ---- toast ---- */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #31bbac;
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.08em;
      padding: 10px 22px;
      border-radius: 3px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      .editor-grid { grid-template-columns: 1fr; }
      .container { padding: 20px 16px 32px; }
      .header { padding: 14px 16px; }
      textarea, .preview-wrap { min-height: 320px; }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turndown/7.1.2/turndown.min.js"></script>

  <script>
    const inputEl   = document.getElementById('input');
    const previewEl = document.getElementById('preview');
    const wordCount = document.getElementById('wordCount');
    const toast     = document.getElementById('toast');
    const fileInput = document.getElementById('fileInput');
    let currentFileName  = 'document.md';
    let previewHasFocus  = false;
    let previewDebounce;

    // ---- Marked (Markdown → HTML) ----
    marked.setOptions({ breaks: true, gfm: true });
    marked.use({
      renderer: {
        code(code, lang) {
          const language = hljs.getLanguage(lang) ? lang : 'plaintext';
          const highlighted = hljs.highlight(code, { language }).value;
          return '<pre><code class="hljs language-' + language + '">' + highlighted + '</code></pre>';
        }
      }
    });

    // ---- Turndown (HTML → Markdown) ----
    const turndown = new TurndownService({ headingStyle: 'atx', codeBlockStyle: 'fenced', bulletListMarker: '-' });
    turndown.addRule('fencedCode', {
      filter: node => node.nodeName === 'PRE' && node.querySelector('code'),
      replacement(_, node) {
        const code = node.querySelector('code');
        const lang = (code.className.match(/language-(\S+)/) || [])[1] || '';
        return '\n\n```' + lang + '\n' + code.textContent.trim() + '\n```\n\n';
      }
    });

    function updateWordCount(md) {
      if (!md.trim()) { wordCount.textContent = ''; return; }
      wordCount.textContent = md.trim().split(/\s+/).length + ' words · ' + md.length + ' chars';
    }

    // Textarea → Preview (never call while user is editing preview)
    function renderFromTextarea() {
      if (previewHasFocus) return;
      const md = inputEl.value;
      if (!md.trim()) {
        previewEl.innerHTML = '<p class="preview-empty">Preview will appear here…</p>';
        updateWordCount('');
        return;
      }
      previewEl.innerHTML = marked.parse(md);
      updateWordCount(md);
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // Track preview focus so we never clobber the user's edits
    previewEl.addEventListener('focus', () => { previewHasFocus = true; });
    previewEl.addEventListener('blur',  () => {
      previewHasFocus = false;
      // Sync preview → textarea when the user leaves
      try {
        const md = turndown.turndown(previewEl.innerHTML);
        inputEl.value = md;
        updateWordCount(md);
      } catch (_) {}
    });

    // Live debounced sync: preview → textarea while typing
    previewEl.addEventListener('input', () => {
      clearTimeout(previewDebounce);
      previewDebounce = setTimeout(() => {
        try {
          const md = turndown.turndown(previewEl.innerHTML);
          inputEl.value = md;
          updateWordCount(md);
        } catch (_) {}
      }, 400);
    });

    // Textarea → re-render preview on every keystroke
    inputEl.addEventListener('input', renderFromTextarea);

    // Open .md file
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      currentFileName = file.name;
      const reader = new FileReader();
      reader.onload = e => { inputEl.value = e.target.result; renderFromTextarea();};
      reader.readAsText(file);
      fileInput.value = '';
    });

    // Save .md file
    document.getElementById('saveMdBtn').addEventListener('click', () => {
      if (!inputEl.value.trim()) return;
      const blob = new Blob([inputEl.value], { type: 'text/markdown' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = currentFileName; a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      inputEl.value = '';
      currentFileName = 'document.md';
      renderFromTextarea();
    });

    document.getElementById('pasteBtn').addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        inputEl.value = text;
        renderFromTextarea();
      } catch (_) {
        inputEl.focus();
        showToast('Press Ctrl+V to paste');
      }
    });

    document.getElementById('copyMdBtn').addEventListener('click', () => {
      if (!inputEl.value.trim()) return;
      navigator.clipboard.writeText(inputEl.value).then(() => showToast('Markdown copied!'));
    });

    document.getElementById('copyHtmlBtn').addEventListener('click', () => {
      const html = previewEl.innerHTML;
      if (!html.trim()) return;
      navigator.clipboard.writeText(html).then(() => showToast('HTML copied!'));
    });

    // ---- Downloads (PDF / PNG / Word / PowerPoint) ----
    const LIB = {
      html2canvas: 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
      html2pdf:    'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js',
      pptxgenjs:   'https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js',
    };
    const scriptCache = {};
    function loadScript(src) {
      if (scriptCache[src]) return scriptCache[src];
      scriptCache[src] = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error('Failed to load ' + src));
        document.head.appendChild(s);
      });
      return scriptCache[src];
    }

    function baseName() {
      return (currentFileName || 'document').replace(/\.(md|markdown|txt)$/i, '') || 'document';
    }
    function downloadBlob(blob, name) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    function hasContent() {
      return previewEl.textContent.trim() && !previewEl.querySelector('.preview-empty');
    }
    // Off-screen print-friendly clone of the rendered preview
    function buildExportNode() {
      const node = document.createElement('div');
      node.className = 'preview';
      node.style.cssText = 'width:780px;padding:40px;background:#fff;color:#333;' +
        'font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.7;' +
        'position:absolute;left:-9999px;top:0;';
      node.innerHTML = previewEl.innerHTML;
      return node;
    }

    async function exportPDF() {
      await loadScript(LIB.html2pdf);
      const node = buildExportNode();
      document.body.appendChild(node);
      try {
        await html2pdf().set({
          margin: [12, 12, 12, 12],
          filename: baseName() + '.pdf',
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, backgroundColor: '#ffffff', useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak: { mode: ['css', 'legacy'] },
        }).from(node).save();
      } finally {
        document.body.removeChild(node);
      }
    }

    async function exportPNG() {
      await loadScript(LIB.html2canvas);
      const node = buildExportNode();
      document.body.appendChild(node);
      try {
        const canvas = await html2canvas(node, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
        await new Promise(res => canvas.toBlob(blob => { downloadBlob(blob, baseName() + '.png'); res(); }, 'image/png'));
      } finally {
        document.body.removeChild(node);
      }
    }

    function exportWord() {
      const styles = 'body{font-family:Calibri,Arial,sans-serif;color:#000;font-size:11pt;}' +
        'h1,h2,h3,h4{font-family:Calibri,Arial,sans-serif;color:#1a1a1a;}' +
        'table{border-collapse:collapse;}td,th{border:1px solid #999;padding:5px 9px;}' +
        'th{background:#f0f0f0;}code,pre{font-family:Consolas,monospace;font-size:10pt;}' +
        'pre{background:#f5f5f5;padding:8px;}blockquote{border-left:3px solid #ccc;padding-left:12px;color:#555;}';
      const html = "<!DOCTYPE html><html xmlns:o='urn:schemas-microsoft-com:office:office' " +
        "xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>" +
        "<head><meta charset='utf-8'><style>" + styles + "</style></head><body>" +
        previewEl.innerHTML + "</body></html>";
      const blob = new Blob(['﻿', html], { type: 'application/msword' });
      downloadBlob(blob, baseName() + '.doc');
    }

    // Split the rendered preview into slides at each H1/H2 (and HR breaks)
    function parseSlides() {
      const slides = [];
      let cur = null;
      const push = () => { if (cur && (cur.title || cur.body.length)) slides.push(cur); };
      const ensure = () => { if (!cur) cur = { title: '', body: [] }; };
      Array.from(previewEl.children).forEach(el => {
        const tag = el.tagName;
        if (tag === 'H1' || tag === 'H2') {
          push();
          cur = { title: el.textContent.trim(), body: [] };
        } else if (tag === 'H3' || tag === 'H4') {
          ensure();
          cur.body.push({ text: el.textContent.trim(), options: { bold: true, fontSize: 18, breakLine: true, paraSpaceBefore: 8 } });
        } else if (tag === 'UL' || tag === 'OL') {
          ensure();
          el.querySelectorAll(':scope > li').forEach(li => {
            cur.body.push({ text: li.textContent.trim(), options: { bullet: true, breakLine: true } });
          });
        } else if (tag === 'BLOCKQUOTE') {
          ensure();
          cur.body.push({ text: el.textContent.trim(), options: { italic: true, color: '666666', breakLine: true } });
        } else if (tag === 'PRE') {
          ensure();
          cur.body.push({ text: el.textContent.replace(/\n+$/, ''), options: { fontFace: 'Courier New', fontSize: 12, color: '444444', breakLine: true } });
        } else if (tag === 'TABLE') {
          ensure();
          el.querySelectorAll('tr').forEach(tr => {
            const row = Array.from(tr.children).map(c => c.textContent.trim()).join('   |   ');
            cur.body.push({ text: row, options: { fontSize: 13, breakLine: true } });
          });
        } else if (tag === 'HR') {
          push(); cur = null;
        } else {
          const txt = el.textContent.trim();
          if (txt) { ensure(); cur.body.push({ text: txt, options: { breakLine: true } }); }
        }
      });
      push();
      if (!slides.length) {
        slides.push({ title: baseName(), body: [{ text: previewEl.textContent.trim(), options: { breakLine: true } }] });
      }
      return slides;
    }

    async function exportPPTX() {
      await loadScript(LIB.pptxgenjs);
      const pptx = new PptxGenJS();
      pptx.layout = 'LAYOUT_WIDE';
      parseSlides().forEach(s => {
        const slide = pptx.addSlide();
        slide.background = { color: 'FFFFFF' };
        const bodyY = s.title ? 1.5 : 0.5;
        if (s.title) {
          slide.addText(s.title, { x: 0.5, y: 0.35, w: 12.3, h: 1, fontSize: 28, bold: true, color: '222222', fontFace: 'Arial' });
        }
        if (s.body.length) {
          slide.addText(s.body, { x: 0.5, y: bodyY, w: 12.3, h: 7.5 - bodyY - 0.4, fontSize: 16, color: '333333', fontFace: 'Arial', valign: 'top' });
        }
      });
      await pptx.writeFile({ fileName: baseName() + '.pptx' });
    }

    const downloadBtn  = document.getElementById('downloadBtn');
    const downloadMenu = document.getElementById('downloadMenu');
    downloadBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      downloadMenu.classList.toggle('open');
    });
    document.addEventListener('click', () => downloadMenu.classList.remove('open'));

    const EXPORTERS = { pdf: exportPDF, png: exportPNG, word: exportWord, pptx: exportPPTX };
    downloadMenu.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-fmt]');
      if (!btn) return;
      downloadMenu.classList.remove('open');
      if (!hasContent()) { showToast('Nothing to export yet'); return; }
      const fmt = btn.dataset.fmt;
      showToast('Preparing ' + fmt.toUpperCase() + '…');
      try {
        await EXPORTERS[fmt]();
      } catch (err) {
        console.error(err);
        showToast('Export failed — please try again');
      }
    });

    // Initial render
    renderFromTextarea();
  </script>
</body>
</html>
